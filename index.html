<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <!-- FontAwesome for attractive icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Flag Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.0.0/css/flag-icons.min.css" />
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<body>
    <div class="app-container">
        <!-- Main Title -->
        <h1 class="main-title" data-i18n="title">Rock Paper Scissors</h1>

        <!-- Language Screen -->
        <div id="language-screen" class="screen active">
            <h2 data-i18n="selectLanguage">Select Language</h2>
            <div class="lang-grid">
                <button class="btn lang-btn" data-lang="tr"><span class="fi fi-tr"></span> Türkçe</button>
                <button class="btn lang-btn" data-lang="en"><span class="fi fi-us"></span> English</button>
                <button class="btn lang-btn" data-lang="de"><span class="fi fi-de"></span> Deutsch</button>
                <button class="btn lang-btn" data-lang="fr"><span class="fi fi-fr"></span> Français</button>
                <button class="btn lang-btn" data-lang="it"><span class="fi fi-it"></span> Italiano</button>
                <button class="btn lang-btn" data-lang="es"><span class="fi fi-es"></span> Español</button>
                <button class="btn lang-btn" data-lang="ar"><span class="fi fi-sa"></span> العربية</button>
            </div>
        </div>

        <!-- Start Screen -->
        <div id="start-screen" class="screen">
            <h2 data-i18n="selectScore">Select Winning Score</h2>
            <p data-i18n="scoreDesc">First to reach the score wins the game!</p>
            <div class="score-buttons">
                <button class="btn score-btn" data-score="1">1</button>
                <button class="btn score-btn" data-score="3">3</button>
                <button class="btn score-btn" data-score="5">5</button>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen">
            <div class="scoreboard">
                <div class="score-box user-score-box">
                    <span class="label" data-i18n="you">You</span>
                    <span id="user-score" class="score">0</span>
                </div>
                <div class="score-box max-score-box">
                    <span class="label" data-i18n="goal">Goal</span>
                    <span id="max-score" class="score">3</span>
                </div>
                <div class="score-box comp-score-box">
                    <span class="label" data-i18n="computer">Computer</span>
                    <span id="comp-score" class="score">0</span>
                </div>
            </div>

            <!-- Arena where choices are animated -->
            <div class="arena">
                <div class="player-side">
                    <div id="user-hand" class="hand">
                        <i class="fa-solid fa-hand-back-fist"></i>
                    </div>
                </div>
                <div class="vs-text">VS</div>
                <div class="computer-side">
                    <div id="comp-hand" class="hand">
                        <i class="fa-solid fa-hand-back-fist"></i>
                    </div>
                </div>
            </div>

            <!-- Result Message -->
            <div id="round-result" class="round-result" data-i18n="makeMove">Make your move!</div>

            <!-- Controls -->
            <div class="controls">
                <button class="btn choice-btn" id="rock" title="Rock">
                    <i class="fa-solid fa-hand-back-fist"></i>
                </button>
                <button class="btn choice-btn" id="paper" title="Paper">
                    <i class="fa-solid fa-hand"></i>
                </button>
                <button class="btn choice-btn" id="scissors" title="Scissors">
                    <i class="fa-solid fa-hand-scissors"></i>
                </button>
            </div>
        </div>

        <!-- End Screen (Overlay) -->
    </div>

    <div id="end-screen" class="overlay hidden">
        <div class="modal">
            <h2 id="final-result-title">You Win!</h2>
            <p id="final-result-text">Congratulations, you defeated the computer.</p>
            <button id="restart-btn" class="btn primary-btn" data-i18n="playAgain">Play Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
